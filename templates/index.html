<!DOCTYPE html>
<html>
<head>
    <title>Global Salary Predictor</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 GOOGLE FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("/static/images/GSP_bg1.jpg") no-repeat center center/cover;
        }

        /* Background */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .background img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .background img.active {
            opacity: 1;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 420px;
            background: rgba(0, 0, 0, 0.55);
            padding: 25px;
            border-radius: 14px;
            backdrop-filter: blur(15px);
            box-shadow: 0px 15px 45px rgba(0,0,0,0.6);
            color: white;
        }

        /* 🔥 GRADIENT TITLE */
        h2 {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            font-size: 24px;
            background: linear-gradient(45deg, #00c6ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
        }

        button {
            width: 48%;
            padding: 12px;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 14px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .predict {
            background: linear-gradient(45deg, #7b2ff7, #f107a3);
        }

        .reset {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            text-align: center;
            margin-top: 15px;
            font-weight: 500;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .container {
                width: 95%;
                padding: 15px;
            }

            .btn-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>

    <script>
        const countryLocations = {
            "USA": ["New York","San Francisco","Seattle","Austin","Chicago","Boston"],
            "UK": ["London","Manchester","Birmingham","Edinburgh"],
            "Germany": ["Berlin","Munich","Frankfurt","Hamburg"],
            "Australia": ["Sydney","Melbourne","Brisbane","Perth"],
            "India": ["Bangalore","Hyderabad","Mumbai","Delhi","Chennai","Pune"],
            "UAE": ["Dubai","Abu Dhabi"],
            "Singapore": ["Singapore"],
            "Malaysia": ["Kuala Lumpur"],
            "Spain": ["Madrid","Barcelona"],
            "Netherlands": ["Amsterdam","Rotterdam"],
            "Ireland": ["Dublin"],
            "Luxembourg": ["Luxembourg"],
            "Canada": ["Toronto","Vancouver","Montreal"],
            "France": ["Paris","Lyon"],
            "Switzerland": ["Zurich","Geneva"],
            "Sweden": ["Stockholm"],
            "Japan": ["Tokyo","Osaka"]
        };

        function updateLocations() {
            const country = document.getElementById("country").value;
            const locationDropdown = document.getElementById("location");

            locationDropdown.innerHTML = "";

            countryLocations[country].forEach(loc => {
                const option = document.createElement("option");
                option.value = loc;
                option.text = loc;
                locationDropdown.appendChild(option);
            });
        }

        function resetForm() {
            window.location.href = "/";
        }
    </script>
</head>

<body>

<div class="background">
    <img src="{{ url_for('static', filename='images/GSP_bg1.jpg') }}" class="active">
    <img src="{{ url_for('static', filename='images/GSP_bg2.jpg') }}">
    <img src="{{ url_for('static', filename='images/GSP_bg3.jpg') }}">
    <img src="{{ url_for('static', filename='images/GSP_bg4.jpg') }}">
    <img src="{{ url_for('static', filename='images/GSP_bg5.jpg') }}">
</div>

<div class="container">
    <h2>💰 Global Salary Predictor</h2>

    <form action="/predict" method="post">

        <input type="number" name="experience" placeholder="Experience"
               value="{{ form_data.experience if form_data else '' }}" required>

        <select name="education">
            <option {% if form_data and form_data.education=='Bachelor' %}selected{% endif %}>Bachelor</option>
            <option {% if form_data and form_data.education=='Master' %}selected{% endif %}>Master</option>
            <option {% if form_data and form_data.education=='PhD' %}selected{% endif %}>PhD</option>
        </select>

        <select name="jobrole">
            {% for role in ["Data Scientist","ML Engineer","Software Engineer","Data Analyst","Cloud Engineer","Cybersecurity"] %}
            <option {% if form_data and form_data.jobrole==role %}selected{% endif %}>{{ role }}</option>
            {% endfor %}
        </select>

        <select name="country" id="country" onchange="updateLocations()">
            {% for c in ["USA","UK","Germany","Australia","India","UAE","Singapore","Malaysia","Spain","Netherlands","Ireland","Luxembourg","Canada","France","Switzerland","Sweden","Japan"] %}
            <option {% if form_data and form_data.country==c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>

        <select name="location" id="location"></select>

        <div class="btn-group">
            <button class="predict" type="submit">Predict</button>
            <button class="reset" type="button" onclick="resetForm()">Reset</button>
        </div>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

<script>
    updateLocations();

    const images = document.querySelectorAll(".background img");
    let index = 0;

    setInterval(() => {
        images[index].classList.remove("active");
        index = (index + 1) % images.length;
        images[index].classList.add("active");
    }, 4000);
</script>

</body>
</html>
